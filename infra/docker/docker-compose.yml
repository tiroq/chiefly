version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chiefly
      POSTGRES_USER: chiefly
      POSTGRES_PASSWORD: chiefly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chiefly -d chiefly"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://chiefly:chiefly@db:5432/chiefly
      LOG_LEVEL: INFO
    env_file:
      - ../../.env
    volumes:
      - ../../credentials:/app/credentials:ro
    restart: unless-stopped

volumes:
  postgres_data:
