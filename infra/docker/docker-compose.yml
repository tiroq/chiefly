services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chiefly}
      POSTGRES_USER: ${POSTGRES_USER:-chiefly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chiefly}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chiefly} -d ${POSTGRES_DB:-chiefly}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chiefly}:${POSTGRES_PASSWORD:-chiefly}@db:5432/${POSTGRES_DB:-chiefly}
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chiefly}:${POSTGRES_PASSWORD:-chiefly}@db:5432/${POSTGRES_DB:-chiefly}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    env_file:
      - ../../.env
    volumes:
      - ../../credentials:/app/credentials:ro
    restart: unless-stopped

volumes:
  postgres_data:
