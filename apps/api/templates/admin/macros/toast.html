{% macro toast(message, type="success") %}
<div id="toast-container" hx-swap-oob="innerHTML:#toast-container">
  <div class="toast toast-{{ type }}" role="alert">
    {{ message }}
  </div>
  <script>
    setTimeout(function() {
      var t = document.querySelector('.toast');
      if (t) t.remove();
    }, 5000);
  </script>
</div>
{% endmacro %}
