{% if result.aliases %}
<ul style="list-style: none; padding: 0; margin: 0 0 1.5rem 0; display: flex; flex-wrap: wrap; gap: 0.5rem;">
  {% for alias in result.aliases %}
  <li style="display: inline-flex; align-items: center; background: #f1f5f9; padding: 0.25rem 0.5rem; border-radius: 4px; border: 1px solid #e2e8f0;">
    <span style="margin-right: 0.5rem;">{{ alias.alias }}</span>
    <form hx-post="/admin/projects/{{ result.project.id }}/aliases/{{ alias.id }}/delete" 
          hx-target="body" 
          method="post" 
          style="display: inline; margin: 0;">
      <button type="submit" style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.25rem; line-height: 1; padding: 0;">&times;</button>
    </form>
  </li>
  {% endfor %}
</ul>
{% else %}
<p class="text-muted" style="margin-bottom: 1.5rem;">No aliases configured.</p>
{% endif %}

<form hx-post="/admin/projects/{{ result.project.id }}/aliases" 
      hx-target="body" 
      method="post"
      style="display: flex; gap: 0.5rem; align-items: flex-end;">
  <div style="flex: 1;">
    <label for="alias" style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Add New Alias</label>
    <input type="text" id="alias" name="alias" placeholder="e.g. work, office" required>
  </div>
  <button type="submit" class="btn btn-primary">Add</button>
</form>
