<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Chiefly Admin{% endblock %} — Chiefly</title>
  <link rel="stylesheet" href="/static/admin/styles.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      {% from "admin/macros/sidebar.html" import sidebar %}
      {{ sidebar(request) }}
    </nav>
    <!-- Main content -->
    <main class="main-content">
      <!-- Toast container for OOB swaps -->
      <div id="toast-container"></div>
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/admin/htmx.min.js"></script>
  <script>
    function showToast(message, type) {
      var container = document.getElementById('toast-container');
      var toast = document.createElement('div');
      toast.className = 'toast toast-' + (type || 'success');
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 4000);
    }
    document.body.addEventListener('showToast', function(evt) {
      showToast(evt.detail.value || evt.detail, 'success');
    });
    document.body.addEventListener('showError', function(evt) {
      showToast(evt.detail.value || evt.detail, 'error');
    });
    document.body.addEventListener('htmx:responseError', function(evt) {
      try {
        var msg = JSON.parse(evt.detail.xhr.responseText).error || 'Request failed';
        showToast(msg, 'error');
      } catch(e) {
        showToast('Request failed', 'error');
      }
    });
  </script>
</body>
</html>
