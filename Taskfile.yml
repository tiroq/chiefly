version: "3"

dotenv: [".env"]

vars:
  PYTHON: .venv/bin/python
  UV: uv

tasks:
  install:
    desc: Install the package with dev dependencies
    cmds:
      - "{{.UV}} pip install -e '.[dev]'"

  dev:
    desc: Start the API server with hot reload
    cmds:
      - .venv/bin/uvicorn apps.api.main:app --reload --reload-dir apps --reload-dir core --reload-dir db --host 0.0.0.0 --port 8000 --log-level debug
    dotenv: [".env"]

  dev:debug:
    desc: Start the API server with hot reload and verbose debug logging
    cmds:
      - .venv/bin/uvicorn apps.api.main:app --reload --reload-dir apps --reload-dir core --reload-dir db --host 0.0.0.0 --port 8000 --log-level debug --access-log
    dotenv: [".env"]

  test:
    desc: Run all tests
    aliases: [t]
    cmds:
      - .venv/bin/pytest tests/ -v

  test:unit:
    desc: Run unit tests
    aliases: [tu]
    cmds:
      - .venv/bin/pytest tests/unit/ -v

  test:integration:
    desc: Run integration tests
    aliases: [ti]
    cmds:
      - .venv/bin/pytest tests/integration/ -v

  lint:
    desc: Run ruff linter
    aliases: [l]
    cmds:
      - .venv/bin/ruff check .

  migrate:
    desc: Apply all pending migrations
    aliases: [m]
    cmds:
      - .venv/bin/alembic upgrade head

  migrate:create:
    desc: Create a new autogenerated migration (use -- --name <name>)
    vars:
      NAME: '{{.CLI_ARGS}}'
    cmds:
      - .venv/bin/alembic revision --autogenerate -m "{{.NAME}}"

  seed:
    desc: Seed initial project data
    cmds:
      - "{{.PYTHON}} scripts/seed_projects.py"

  auth:token:
    desc: Authorize Google OAuth token and verify it works against the Tasks API
    aliases: [a]
    dotenv: [".env"]
    cmds:
      - "{{.PYTHON}} scripts/auth_tasks.py"
      - cp scripts/token.json credentials/token.json
      - |
        {{.PYTHON}} -c "
        import sys
        from apps.api.services.google_tasks_service import GoogleTasksService
        svc = GoogleTasksService('credentials/token.json')
        lists = svc.list_tasklists()
        if not lists and lists is not None:
            print('Token verified OK — 0 task lists found (API reachable)')
        elif lists:
            print(f'Token verified OK — {len(lists)} task list(s) accessible')
        else:
            print('ERROR: could not verify token', file=sys.stderr)
            sys.exit(1)
        "

  docker:up:
    desc: Start Docker services in the background
    aliases: [up]
    cmds:
      - docker compose -f infra/docker/docker-compose.yml up -d

  docker:down:
    desc: Stop Docker services
    aliases: [down]
    cmds:
      - docker compose -f infra/docker/docker-compose.yml down

  docker:logs:
    desc: Tail Docker service logs
    aliases: [logs]
    cmds:
      - docker compose -f infra/docker/docker-compose.yml logs -f

  docker:tail:
    desc: Tail last 50 lines then follow Docker service logs
    aliases: [tail]
    cmds:
      - docker compose -f infra/docker/docker-compose.yml logs --tail=50 -f

  docker:rebuild:
    desc: Rebuild API image and restart the service (keeps DB & data)
    aliases: [rebuild]
    cmds:
      - docker compose -f infra/docker/docker-compose.yml build api migrate
      - docker compose -f infra/docker/docker-compose.yml up -d --force-recreate api

  docker:rebuild-scratch:
    desc: Full teardown, rebuild from scratch, and bring everything back up
    aliases: [s, scratch]
    cmds:
      - docker compose -f infra/docker/docker-compose.yml down -v
      - docker compose -f infra/docker/docker-compose.yml build
      - docker compose -f infra/docker/docker-compose.yml up -d

  docker:dev:
    desc: Start Docker services with hot reload development mode
    cmds:
      - docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.dev.yml up -d

  docker:dev:stop:
    desc: Stop Docker development services
    cmds:
      - docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.dev.yml down

  docker:dev:logs:
    desc: Tail Docker development service logs
    cmds:
      - docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.dev.yml logs -f

  docker:dev:rebuild:
    desc: Rebuild and restart Docker dev services with hot reload
    cmds:
      - docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.dev.yml build api migrate
      - docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.dev.yml up -d --force-recreate api
